<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../css/custom.css">
</head>
<body class="aac">
<div class="aac-page">
    <div class="aac-page-title">
        <span class="title-bar"></span>
        评审意见管理 — 我提出的意见
    </div>

    <div class="aac-search-bar">
        <input type="text" placeholder="搜索项目、分析任务、意见内容...">
        <select style="width:140px;">
            <option value="">全部状态</option>
            <option value="pending">待处理</option>
            <option value="replied">已回复</option>
            <option value="closed">已关闭</option>
        </select>
        <button class="aac-btn aac-btn-primary">搜索</button>
        <button class="aac-btn aac-btn-secondary">重置</button>
    </div>

    <div class="aac-card" style="padding:0;overflow:hidden;">
        <table class="aac-table">
            <thead>
                <tr>
                    <th>项目</th>
                    <th>分析任务</th>
                    <th>意见负责人</th>
                    <th>意见内容</th>
                    <th>状态</th>
                    <th>回复内容</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="opinion-list"></tbody>
        </table>
    </div>

    <div class="aac-pagination">
        <span class="page-info">共 3 条</span>
        <button class="page-btn active">1</button>
    </div>
</div>

<script src="../js/mock-data.js"></script>
<script>
(function () {
    var opinions = MockData.get('myOpinions');
    var tbody = document.getElementById('opinion-list');
    var statusMap = {
        'pending': '<span class="aac-badge aac-badge-pending">待处理</span>',
        'replied': '<span class="aac-badge aac-badge-submitted">已回复</span>',
        'closed': '<span class="aac-badge aac-badge-closed">已关闭</span>'
    };

    opinions.forEach(function (o) {
        var ops = '<button class="aac-btn aac-btn-link" onclick="alert(\'查看意见详细信息\')">查看详情</button>';
        if (o.status === 'replied') {
            ops += '<button class="aac-btn aac-btn-link" style="color:var(--success);" onclick="alert(\'闭环操作\')">闭环</button>';
        }

        var tr = document.createElement('tr');
        tr.innerHTML =
            '<td>' + o.project + '</td>' +
            '<td style="max-width:180px;">' + o.analysisTask + '</td>' +
            '<td>' + o.owner + '</td>' +
            '<td style="max-width:240px;">' + o.content + '</td>' +
            '<td>' + (statusMap[o.status] || o.status) + '</td>' +
            '<td style="max-width:200px;color:var(--text-secondary);font-size:12px;">' + (o.reply || '-') + '</td>' +
            '<td style="white-space:nowrap;">' + ops + '</td>';
        tbody.appendChild(tr);
    });
})();
</script>
</body>
</html>
