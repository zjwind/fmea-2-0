<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../css/custom.css">
</head>
<body class="aac">
<div class="aac-page">
    <div class="aac-page-title">
        <span class="title-bar"></span>
        评估任务 — 系统级
    </div>

    <div class="aac-search-bar">
        <input type="text" placeholder="搜索项目名称、任务名称...">
        <select style="width:140px;">
            <option value="">全部状态</option>
            <option value="draft">草稿</option>
            <option value="in-progress">进行中</option>
            <option value="submitted">已提交</option>
            <option value="confirmed">已确认</option>
            <option value="completed">已完成</option>
        </select>
        <button class="aac-btn aac-btn-primary">搜索</button>
        <button class="aac-btn aac-btn-secondary">重置</button>
    </div>

    <div class="aac-card" style="padding:0;overflow:hidden;">
        <table class="aac-table">
            <thead>
                <tr>
                    <th>项目</th>
                    <th>项目里程碑</th>
                    <th>任务名称</th>
                    <th>TSE</th>
                    <th>PSE</th>
                    <th>状态</th>
                    <th>开始时间</th>
                    <th>期望结束时间</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="task-list"></tbody>
        </table>
    </div>

    <div class="aac-pagination">
        <span class="page-info">共 5 条</span>
        <button class="page-btn active">1</button>
    </div>
</div>

<script src="../js/mock-data.js"></script>
<script>
(function () {
    var tasks = MockData.get('evaluationTasksSystem');
    var tbody = document.getElementById('task-list');
    var statusMap = {
        'draft': '<span class="aac-badge aac-badge-draft">草稿</span>',
        'in-progress': '<span class="aac-badge aac-badge-in-progress">进行中</span>',
        'submitted': '<span class="aac-badge aac-badge-submitted">已提交</span>',
        'confirmed': '<span class="aac-badge aac-badge-confirmed">已确认</span>',
        'completed': '<span class="aac-badge aac-badge-completed">已完成</span>'
    };

    tasks.forEach(function (t) {
        var ops = '<button class="aac-btn aac-btn-link" onclick="parent.App.openPage(\'系统级评估详情\',\'pages/evaluation-detail-system.html\',\'eval-detail-sys\')">评估</button>';
        ops += '<button class="aac-btn aac-btn-link" onclick="parent.App.openPage(\'系统级评估详情\',\'pages/evaluation-detail-system.html\',\'eval-detail-sys\')">查看详情</button>';
        if (t.canSkip) {
            ops += '<button class="aac-btn aac-btn-link" style="color:var(--warning);" onclick="alert(\'跳过操作（仅PM权限）\')">跳过</button>';
        }
        ops += '<button class="aac-btn aac-btn-link" onclick="alert(\'查看关联分析任务\')">查看分析任务</button>';

        var tr = document.createElement('tr');
        tr.innerHTML =
            '<td>' + t.project + '</td>' +
            '<td>' + t.milestone + '</td>' +
            '<td>' + t.taskName + '</td>' +
            '<td>' + t.tse + '</td>' +
            '<td>' + t.pse + '</td>' +
            '<td>' + (statusMap[t.status] || t.status) + '</td>' +
            '<td>' + t.startTime + '</td>' +
            '<td>' + t.expectedEndTime + '</td>' +
            '<td style="white-space:nowrap;">' + ops + '</td>';
        tbody.appendChild(tr);
    });
})();
</script>
</body>
</html>
