<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../css/custom.css">
    <style>
        .eval-change-table { width: 100%; border-collapse: collapse; }
        .eval-change-table th, .eval-change-table td { border: 1px solid var(--border-color); padding: 8px 12px; font-size: 12px; text-align: left; }
        .eval-change-table th { background: var(--primary-light); color: var(--primary-dark); font-weight: 600; white-space: nowrap; }
        .eval-change-table .level-0 { background: #eef0fe; font-weight: 700; }
        .eval-change-table .level-1 { padding-left: 28px; background: #f8f9fb; }
        .eval-change-table .level-2 { padding-left: 48px; }
        .eval-change-table .changed { color: var(--danger); font-weight: 500; }
        .eval-change-table .imn-tag { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; }
        .imn-I { background: #dcfce7; color: #16a34a; }
        .imn-M { background: #fef3c7; color: #d97706; }
        .imn-N { background: #fee2e2; color: #dc2626; }
        .five-dim-eval { width: 100%; border-collapse: collapse; }
        .five-dim-eval th, .five-dim-eval td { border: 1px solid var(--border-color); padding: 8px 10px; font-size: 12px; text-align: center; }
        .five-dim-eval th { background: var(--primary-light); color: var(--primary-dark); font-weight: 600; }
        .five-dim-eval .dim-name { background: var(--gray-50); font-weight: 600; text-align: left; width: 120px; }
        .five-dim-eval .weight { color: var(--text-secondary); font-size: 11px; }
        .five-dim-eval .risk-col { width: 60px; }
        .five-dim-eval .option-cell { padding: 4px 6px; }
        .five-dim-eval .option-cell label { display: flex; align-items: center; gap: 2px; font-size: 11px; cursor: pointer; }
        .five-dim-eval .score-cell { font-weight: 700; font-size: 14px; }
        .score-H { color: #ef4444; }
        .score-M { color: #f59e0b; }
        .score-L { color: #22c55e; }
        .eval-summary-bar { display: flex; align-items: center; gap: 16px; padding: 16px 20px; background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: var(--radius-lg); margin-bottom: 16px; }
        .eval-summary-bar .summary-item { text-align: center; }
        .eval-summary-bar .summary-value { font-size: 20px; font-weight: 700; }
        .eval-summary-bar .summary-label { font-size: 11px; color: var(--text-secondary); }
        .history-table { width: 100%; border-collapse: collapse; }
        .history-table th, .history-table td { border: 1px solid var(--border-color); padding: 8px 12px; font-size: 12px; text-align: left; }
        .history-table th { background: var(--primary-light); color: var(--primary-dark); font-weight: 600; }
    </style>
</head>
<body class="aac">
<div class="aac-page">
    <div class="aac-page-title">
        <span class="title-bar"></span>
        系统级评估任务详情
        <span style="font-size:13px;font-weight:400;color:var(--text-secondary);margin-left:8px;">CloudEngine S12700E系列交换机 — 系统级DRBFM评估</span>
    </div>

    <div style="display:flex;gap:8px;margin-bottom:16px;">
        <button class="aac-btn aac-btn-primary aac-btn-sm" onclick="alert('保存当前内容')">💾 保存</button>
        <button class="aac-btn aac-btn-ghost aac-btn-sm">🔄 刷新</button>
        <button class="aac-btn aac-btn-ghost aac-btn-sm" onclick="alert('撤回修改')">↩ 撤回</button>
    </div>

    <div id="step-progress-container"></div>

    <div style="display:flex;gap:4px;margin-bottom:16px;background:var(--bg-surface);border-radius:var(--radius);padding:4px;border:1px solid var(--border-color);" id="step-tabs"></div>

    <div id="step-panels">
        <div id="panel-import" class="step-panel"></div>
        <div id="panel-review" class="step-panel" style="display:none;"></div>
        <div id="panel-history" class="step-panel" style="display:none;"></div>
        <div id="panel-five-dim" class="step-panel" style="display:none;"></div>
        <div id="panel-confirm" class="step-panel" style="display:none;"></div>
    </div>
</div>

<script src="../js/mock-data.js"></script>
<script>
(function () {
    var currentStep = 0;
    var steps = ['导入变更清单', 'PSE审核', '提交历史问题', '五维风险评估', '评分确认'];

    document.getElementById('step-progress-container').innerHTML = parent.App.buildStepProgress(steps, currentStep);

    var tabsContainer = document.getElementById('step-tabs');
    steps.forEach(function (s, i) {
        var btn = document.createElement('button');
        btn.className = 'aac-btn aac-btn-sm' + (i === currentStep ? ' aac-btn-primary' : (i < currentStep ? ' aac-btn-secondary' : ' aac-btn-ghost'));
        if (i < currentStep) btn.style.cssText = 'border-color:var(--success);color:var(--success);';
        btn.textContent = s;
        btn.style.flex = '1';
        btn.onclick = function () { showStep(i); };
        tabsContainer.appendChild(btn);
    });

    function showStep(idx) {
        var panels = ['panel-import', 'panel-review', 'panel-history', 'panel-five-dim', 'panel-confirm'];
        panels.forEach(function (p, i) {
            document.getElementById(p).style.display = i === idx ? 'block' : 'none';
        });
        var btns = tabsContainer.querySelectorAll('.aac-btn');
        btns.forEach(function (b, i) {
            b.className = 'aac-btn aac-btn-sm';
            if (i === idx) b.className += ' aac-btn-primary';
            else if (i < currentStep) { b.className += ' aac-btn-secondary'; b.style.cssText = 'border-color:var(--success);color:var(--success);'; }
            else b.className += ' aac-btn-ghost';
        });
    }

    renderImport();
    renderReview();
    renderHistory();
    renderFiveDim();
    renderConfirm();

    function renderImport() {
        var html = '';

        html += '<div class="eval-summary-bar">';
        html += '<div class="summary-item"><div class="summary-value">23</div><div class="summary-label">变更点总数</div></div>';
        html += '<div class="summary-item"><div class="summary-value" style="color:#ef4444;">8</div><div class="summary-label">高风险项</div></div>';
        html += '<div class="summary-item"><div class="summary-value" style="color:#f59e0b;">5</div><div class="summary-label">中风险项</div></div>';
        html += '<div class="summary-item"><div class="summary-value" style="color:#9aa0a6;">10</div><div class="summary-label">低风险项</div></div>';
        html += '<div style="margin-left:auto;display:flex;gap:8px;">';
        html += '<button class="aac-btn aac-btn-secondary aac-btn-sm">📥 导入变更清单</button>';
        html += '<button class="aac-btn aac-btn-secondary aac-btn-sm">📥 导入质量策划</button>';
        html += '<button class="aac-btn aac-btn-primary aac-btn-sm" onclick="alert(\'自动匹配：读取线上表单内容，匹配质量策划内容进行更新\')">🔄 自动匹配</button>';
        html += '</div></div>';

        html += '<div class="aac-card" style="background:var(--primary-light);border-color:var(--primary);margin-bottom:16px;padding:12px 20px;">';
        html += '<div style="font-size:12px;color:var(--primary-dark);line-height:1.8;">';
        html += '<strong>导入顺序说明：</strong><br>';
        html += '1. 先导入变更清单 → 直接更新线上表格；再导入质量策划 → 根据线上变更清单匹配更新<br>';
        html += '2. 先导入质量策划 → 线上变更清单为空，不触发匹配；再导入变更清单 → 读取质量策划内容匹配更新<br>';
        html += '3. 点击"自动匹配"→ 读取线上表单内容，匹配质量策划内容进行更新';
        html += '</div></div>';

        html += '<div class="aac-card" style="padding:0;overflow:hidden;">';
        html += '<div class="aac-toolbar"><span class="toolbar-title">变更点清单</span><span style="font-size:12px;color:var(--text-secondary);">共 23 条变更点</span></div>';
        html += '<div style="overflow-x:auto;">';
        html += '<table class="eval-change-table">';
        html += '<thead><tr><th>Level</th><th>ID</th><th>系统/部件名称</th><th>开发类别</th><th>I/M/N</th><th>变更点</th><th>质量策划匹配</th></tr></thead>';
        html += '<tbody>';

        var changes = [
            { level: 0, id: '1', name: 'CloudEngine S12700E整机系统', dev: 'NEW', imn: 'I', change: '新增400GE接口板卡支持', match: '400GE接口风险策划指南' },
            { level: 1, id: '1.1', name: '主控板子系统', dev: 'MODIFY', imn: 'M', change: '主控板CPU升级至ARM A72架构', match: 'CPU架构切换风险策划' },
            { level: 2, id: '1.1.1', name: '主控板PCB', dev: 'MODIFY', imn: 'M', change: 'PCB层数从12层增加到16层', match: '' },
            { level: 2, id: '1.1.2', name: '主控板散热模组', dev: 'MODIFY', imn: 'M', change: '散热片尺寸增大20%', match: '散热设计变更策划' },
            { level: 1, id: '1.2', name: '交换网板子系统', dev: 'MODIFY', imn: 'M', change: '交换芯片带宽升级至25.6Tbps', match: '交换芯片升级策划' },
            { level: 2, id: '1.2.1', name: '交换芯片', dev: 'NEW', imn: 'I', change: '采用新一代SDN交换芯片', match: '新芯片导入策划' },
            { level: 1, id: '1.3', name: '接口板子系统', dev: 'NEW', imn: 'N', change: '新增400GE QSFP-DD接口板', match: '400GE接口风险策划指南' },
            { level: 0, id: '2', name: '电源子系统', dev: 'MODIFY', imn: 'M', change: '电源模块从1500W升级至3000W', match: '电源功率升级策划' },
            { level: 1, id: '2.1', name: 'AC电源模块', dev: 'MODIFY', imn: 'M', change: '功率密度提升，散热结构重新设计', match: '电源散热设计策划' }
        ];

        changes.forEach(function (c) {
            var levelCls = 'level-' + c.level;
            var imnCls = 'imn-' + c.imn;
            var changeCls = c.change ? 'changed' : '';
            var matchContent = c.match ? '<span style="color:var(--success);">' + c.match + '</span>' : '<span style="color:var(--gray-400);">未匹配</span>';

            html += '<tr>';
            html += '<td class="' + levelCls + '">' + c.level + '</td>';
            html += '<td class="' + levelCls + '">' + c.id + '</td>';
            html += '<td class="' + levelCls + '">' + c.name + '</td>';
            html += '<td><span class="aac-tag ' + (c.dev === 'NEW' ? 'aac-tag-danger' : 'aac-tag-warning') + '">' + c.dev + '</span></td>';
            html += '<td><span class="imn-tag ' + imnCls + '">' + c.imn + '</span></td>';
            html += '<td class="' + changeCls + '">' + c.change + '</td>';
            html += '<td>' + matchContent + '</td>';
            html += '</tr>';
        });

        html += '</tbody></table></div></div>';

        html += '<div style="display:flex;justify-content:flex-end;margin-top:16px;">';
        html += '<button class="aac-btn aac-btn-primary" onclick="alert(\'TSE确认提交，任务转PSE审核\')">确认提交 → 转PSE审核</button>';
        html += '</div>';

        document.getElementById('panel-import').innerHTML = html;
    }

    function renderReview() {
        var html = '<div class="aac-split-layout">';
        html += '<div class="aac-split-left" style="width:400px;">';

        html += '<div class="aac-card">';
        html += '<div class="card-title">审核信息</div>';
        html += '<ul class="aac-info-list">';
        html += '<li><span class="info-label">提交人</span><span class="info-value">张三（TSE）</span></li>';
        html += '<li><span class="info-label">提交时间</span><span class="info-value">2026-01-18 14:30</span></li>';
        html += '<li><span class="info-label">提交次数</span><span class="info-value">1</span></li>';
        html += '<li><span class="info-label">审核人</span><span class="info-value">李四（PSE）</span></li>';
        html += '<li><span class="info-label">审核状态</span><span class="info-value"><span class="aac-badge aac-badge-pending">待审核</span></span></li>';
        html += '</ul></div>';

        html += '<div class="aac-card">';
        html += '<div class="card-title">PSE审核操作</div>';
        html += '<div style="margin-bottom:12px;"><label style="font-size:12px;color:var(--text-secondary);display:block;margin-bottom:4px;">审核意见</label>';
        html += '<textarea placeholder="请输入审核意见..." style="width:100%;height:100px;resize:vertical;"></textarea></div>';
        html += '<div style="display:flex;gap:8px;">';
        html += '<button class="aac-btn aac-btn-primary" style="flex:1;" onclick="alert(\'审核通过，任务自动转回TSE提交历史问题\')">✓ 审核通过</button>';
        html += '<button class="aac-btn aac-btn-danger" style="flex:1;" onclick="alert(\'审核不通过，通知TSE重新提交\')">✕ 审核不通过</button>';
        html += '</div></div>';

        html += '</div>';

        html += '<div class="aac-split-right">';
        html += '<div class="aac-card">';
        html += '<div class="card-title">变更点清单预览</div>';
        html += '<div style="overflow-x:auto;">';
        html += '<table class="eval-change-table">';
        html += '<thead><tr><th>ID</th><th>系统/部件名称</th><th>开发类别</th><th>I/M/N</th><th>变更点</th></tr></thead>';
        html += '<tbody>';
        var items = [
            { id: '1', name: 'CloudEngine S12700E整机系统', dev: 'NEW', imn: 'I', change: '新增400GE接口板卡支持' },
            { id: '1.1', name: '主控板子系统', dev: 'MODIFY', imn: 'M', change: '主控板CPU升级至ARM A72架构' },
            { id: '1.2', name: '交换网板子系统', dev: 'MODIFY', imn: 'M', change: '交换芯片带宽升级至25.6Tbps' },
            { id: '1.3', name: '接口板子系统', dev: 'NEW', imn: 'N', change: '新增400GE QSFP-DD接口板' },
            { id: '2', name: '电源子系统', dev: 'MODIFY', imn: 'M', change: '电源模块从1500W升级至3000W' }
        ];
        items.forEach(function (c) {
            html += '<tr><td>' + c.id + '</td><td>' + c.name + '</td><td><span class="aac-tag ' + (c.dev === 'NEW' ? 'aac-tag-danger' : 'aac-tag-warning') + '">' + c.dev + '</span></td><td><span class="imn-tag imn-' + c.imn + '">' + c.imn + '</span></td><td class="changed">' + c.change + '</td></tr>';
        });
        html += '</tbody></table></div></div>';
        html += '</div></div>';

        document.getElementById('panel-review').innerHTML = html;
    }

    function renderHistory() {
        var html = '';

        html += '<div class="aac-card" style="background:var(--primary-light);border-color:var(--primary);margin-bottom:16px;padding:12px 20px;">';
        html += '<div style="font-size:12px;color:var(--primary-dark);line-height:1.8;">';
        html += '<strong>说明：</strong>PSE审核通过后，TSE需提交历史问题。历史问题需与系统级评估任务进行关联，后续部件级评估任务也会读取系统级评估任务的历史问题。';
        html += '</div></div>';

        html += '<div style="display:flex;gap:8px;margin-bottom:16px;">';
        html += '<button class="aac-btn aac-btn-primary aac-btn-sm" onclick="alert(\'导入历史问题Excel\')">📥 导入历史问题</button>';
        html += '<button class="aac-btn aac-btn-secondary aac-btn-sm" onclick="alert(\'从历史问题库选择\')">📚 从历史问题库选择</button>';
        html += '</div>';

        html += '<div class="aac-card" style="padding:0;overflow:hidden;">';
        html += '<div class="aac-toolbar"><span class="toolbar-title">历史问题列表</span><span style="font-size:12px;color:var(--text-secondary);">共 4 条</span></div>';
        html += '<div style="overflow-x:auto;">';
        html += '<table class="history-table">';
        html += '<thead><tr><th>故障单号</th><th>问题编号</th><th>问题类型</th><th>涉及领域</th><th>产品型号</th><th>问题描述</th><th>解决方案</th></tr></thead>';
        html += '<tbody>';
        var issues = [
            { faultNo: 'FT-2024-0156', issueNo: 'IS-001', type: '设计缺陷', domain: '散热', product: 'S12800', desc: '主控板高温下复位', solution: '增加散热片面积，提高热保护阈值' },
            { faultNo: 'FT-2024-0289', issueNo: 'IS-002', type: '信号完整性', domain: '高速接口', product: 'AR6100', desc: '光模块识别异常', solution: '优化I2C总线信号完整性设计' },
            { faultNo: 'FT-2025-0034', issueNo: 'IS-003', type: '电源问题', domain: '电源', product: 'P600', desc: '电源模块输出纹波超标', solution: '更换低ESR滤波电容' },
            { faultNo: 'FT-2025-0078', issueNo: 'IS-004', type: '射频问题', domain: '无线', product: '5760', desc: 'WiFi6E 6GHz频段吞吐量下降', solution: '更换宽带滤波器' }
        ];
        issues.forEach(function (iss) {
            html += '<tr><td>' + iss.faultNo + '</td><td>' + iss.issueNo + '</td><td><span class="aac-tag aac-tag-warning">' + iss.type + '</span></td><td>' + iss.domain + '</td><td>' + iss.product + '</td><td style="max-width:200px;">' + iss.desc + '</td><td style="max-width:200px;">' + iss.solution + '</td></tr>';
        });
        html += '</tbody></table></div></div>';

        html += '<div style="display:flex;justify-content:flex-end;margin-top:16px;">';
        html += '<button class="aac-btn aac-btn-primary" onclick="alert(\'提交历史问题，生成DRBFM评估表\')">提交历史问题 → 生成评估表</button>';
        html += '</div>';

        document.getElementById('panel-history').innerHTML = html;
    }

    function renderFiveDim() {
        var html = '';

        html += '<div class="aac-card" style="background:var(--primary-light);border-color:var(--primary);margin-bottom:16px;padding:12px 20px;">';
        html += '<div style="font-size:12px;color:var(--primary-dark);line-height:1.8;">';
        html += '<strong>五维评估说明：</strong>对LEVEL=0的项目进行五维评估，每个维度有多个选项（高/中/低），五维评分必须手填。填完后点击"风险评分"按钮生成风险综合评分。<br>';
        html += '<strong>计算公式：</strong>风险综合评分 = 技术新颖性×15% + 影响范围×30% + 失效严重度×30% + 变更复杂度×20% + 历史问题×5%<br>';
        html += '<strong>判定规则：</strong>≥8分(H)必须进行DRBFM分析；5-8分(M)建议进行DRBFM分析；＜5分(L)可以不进行DRBFM分析';
        html += '</div></div>';

        html += '<div style="display:flex;gap:8px;margin-bottom:16px;">';
        html += '<button class="aac-btn aac-btn-primary" onclick="calculateScore()">📊 风险评分</button>';
        html += '<button class="aac-btn aac-btn-secondary" onclick="alert(\'AI根据评分生成建议理由\')">🤖 AI生成建议</button>';
        html += '</div>';

        var dims = [
            {
                name: '技术新颖性', weight: '15%', options: {
                    high: ['采用全新技术架构', '无任何历史经验参考', '行业首创技术方案'],
                    mid: ['部分技术有参考案例', '核心技术有积累但应用场景不同'],
                    low: ['成熟技术新应用', '有充分的历史经验']
                }
            },
            {
                name: '影响范围', weight: '30%', options: {
                    high: ['影响多个子系统', '涉及核心业务链路', '跨产品平台影响'],
                    mid: ['影响单一子系统', '仅影响辅助功能'],
                    low: ['影响范围可控', '仅影响非关键路径']
                }
            },
            {
                name: '失效严重度', weight: '30%', options: {
                    high: ['可能导致人身安全风险', '法规不符合产品无法上市', '核心功能完全丧失'],
                    mid: ['核心功能严重降级', '辅助功能丧失'],
                    low: ['辅助功能轻微降级', '外观或非功能性问题']
                }
            },
            {
                name: '变更复杂度', weight: '20%', options: {
                    high: ['涉及多专业交叉变更', '变更接口数量超过10个', '需协调3个以上团队'],
                    mid: ['涉及2个专业变更', '变更接口数量5-10个'],
                    low: ['单一专业变更', '变更接口数量少于5个']
                }
            },
            {
                name: '历史问题', weight: '5%', options: {
                    high: ['同类产品曾发生严重失效', '有未关闭的严重历史问题', '历史问题复现风险高'],
                    mid: ['有中等严重度历史问题', '历史问题已有临时措施'],
                    low: ['无相关历史问题', '历史问题已彻底解决']
                }
            }
        ];

        html += '<div class="aac-card" style="padding:0;overflow:hidden;">';
