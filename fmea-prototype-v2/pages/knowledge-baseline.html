<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../css/custom.css">
</head>
<body class="aac">
<div class="aac-page">
    <div class="aac-page-title">
        <span class="title-bar"></span>
        知识库 — 基线库
    </div>

    <div class="aac-card" style="background:var(--primary-light);border-color:var(--primary);margin-bottom:16px;padding:12px 20px;">
        <div style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--primary-dark);">
            <span>🚧</span>
            <span>基线库功能暂不明确，当前为预留页面，后续根据需求细化</span>
        </div>
    </div>

    <div class="aac-search-bar">
        <input type="text" placeholder="搜索基线名称..." disabled>
        <select style="width:140px;" disabled><option value="">全部分类</option></select>
        <button class="aac-btn aac-btn-primary" disabled>搜索</button>
    </div>

    <div class="aac-empty" style="min-height:300px;">
        <div class="empty-icon">📚</div>
        <div class="empty-text">基线库功能开发中，敬请期待</div>
        <div style="font-size:12px;color:var(--gray-500);margin-top:8px;">基线库将包含：失效库、措施库、功能库等知识资产</div>
    </div>
</div>
</body>
</html>
