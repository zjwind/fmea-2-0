function buildStepBar(){
var html='';
for(var i=0;i<steps.length;i++){

if(completedSteps[i]) cls+=' done';

html+='<div class="'+cls+'"><span class="step-num">'+numText+'</span><span>'+steps[i].name+'</span></div>';
}
document.getElementById('stepBar').innerHTML=html;
}

var resultHeaders=['风险综合评分(1-12分)','风险等级','DRBFM触发评估建议','理由及建议分析重点','最终DRBFM触发结论','拒绝建议理由'];

h+='<tr>';

h+='</tr></thead><tbody>';

for(var ri=0;ri<rows.length;ri++){
var row=rows[ri];
h+='<tr class="level-'+row.level+'">';
for(var i=0;i<leftColDefs.length;i++){var isLast=(i===leftColDefs.length-1);var cls='sticky-col'+(isLast?' last-sticky':'');var val=row[leftColDefs[i].key];var style='left:'+getLeftOffset(i)+'px;min-width:'+leftColDefs[i].width+'px';if(leftColDefs[i].key==='name'){var indent=row.level*16;style+=';text-align:left;padding-left:'+(8+indent)+'px';}else if(leftColDefs[i].key==='change'){style+=';text-align:left';}h+='<td class="'+cls+'" style="'+style+'">'+val+'</td>';}

if(row.level===0){
for(var d=0;d<dims.length;d++){var allOpts=dims[d].high.concat(dims[d].mid).concat(dims[d].low);for(var o=0;o<allOpts.length;o++){var gIdx=o<dims[d].high.length?0:(o<dims[d].high.length+dims[d].mid.length?1:2);var gKeys=['h','m','l'];var oIdx=o<dims[d].high.length?o:(o<dims[d].high.length+dims[d].mid.length?o-dims[d].high.length:o-dims[d].high.length-dims[d].mid.length);var rName='r_'+row.id+'_d'+d+'_'+gKeys[gIdx]+'_'+oIdx;h+='<td class="opt-cell'+(o===0?' dim-start':'')+'"><div class="radio-wrap">';h+='<label><input type="radio" name="'+rName+'" value="是">是</label>';h+='<label><input type="radio" name="'+rName+'" value="否">否</label>';h+='</div></td>';}}

function getDimScore(rowId,dimIdx){
var dim=dims[dimIdx];
var groups=[{key:'h',count:dim.high.length},{key:'m',count:dim.mid.length},{key:'l',count:dim.low.length}];
var scores=[10,5,1];
for(var g=0;g<groups.length;g++){for(var o=0;o<groups[g].count;o++){var rName='r_'+rowId+'_d'+dimIdx+'_'+groups[g].key+'_'+o;var checked=document.querySelector('input[name="'+rName+'"]:checked');if(checked&&checked.value==='是')return scores[g];}}
var hasAny=false;
for(var g=0;g<groups.length;g++){for(var o=0;o<groups[g].count;o++){var rName='r_'+rowId+'_d'+dimIdx+'_'+groups[g].key+'_'+o;if(document.querySelector('input[name="'+rName+'"]:checked')){hasAny=true;break;}}if(hasAny)break;}
return hasAny?0:-1;
}

function getRiskLevel(score){if(score>=8)return'H';if(score>=5)return'M';return'L';}
function getRiskBadge(level){return'<span class="risk-badge risk-badge-'+level+'">'+level+'</span>';}
function getSuggestText(level){var map={H:'必须进行DRBFM分析',M:'建议进行DRBFM分析',L:'可以不进行DRBFM分析'};return map[level]||'';}

function buildReasonText(dimScores,level){
var parts=[];var focusParts=[];
for(var d=0;d<dims.length;d++){if(dimScores[d]>=10){parts.push(dims[d].name+'高风险(10分)');focusParts.push('重点分析'+dims[d].name+'相关失效模式及预防措施');}else if(dimScores[d]>=5){parts.push(dims[d].name+'中风险(5分)');focusParts.push('关注'+dims[d].name+'相关潜在风险');}}
if(parts.length===0)return'各维度风险较低，变更整体风险可控';
var reason=parts.join('、')+'，综合风险等级为'+level+'级';
if(focusParts.length>0)reason+='。'+focusParts.join('；');
return reason;
}

function calculateScore(){
var level0Rows=rows.filter(function(r){return r.level===0;});
var allFilled=true;var results=[];
for(var i=0;i<level0Rows.length;i++){
var row=level0Rows[i];var dimScores=[];var totalWeighted=0;
for(var d=0;d<dims.length;d++){var s=getDimScore(row.id,d);if(s<0){allFilled=false;s=0;}dimScores.push(s);totalWeighted+=s*dims[d].weight;}
totalWeighted=Math.round(totalWeighted*100)/100;
var scaledScore=Math.round(totalWeighted*1.2*10)/10;
if(scaledScore>12)scaledScore=12;
if(scaledScore<1&&totalWeighted>0)scaledScore=1;
if(totalWeighted===0)scaledScore=0;
var level=getRiskLevel(scaledScore);
results.push({row:row,dimScores:dimScores,total:scaledScore,rawTotal:totalWeighted,level:level});
}
if(!allFilled){alert('部分维度的选项未填写完整，未填写的维度将按0分计算。');}
for(var i=0;i<results.length;i++){
var res=results[i];
for(var d=0;d<dims.length;d++){var cell=document.getElementById('sc_'+res.row.id+'_'+d);if(cell){var sc=res.dimScores[d];var cls=sc>=10?'score-high':(sc>=5?'score-mid':(sc>=1?'score-low':'score-zero'));cell.innerHTML='<span class="'+cls+'">'+sc+'</span>';}}
var tsCell=document.getElementById('ts_'+res.row.id);if(tsCell)tsCell.innerHTML='<span style="color:var(--primary)">'+res.total+'</span>';
var rlCell=document.getElementById('rl_'+res.row.id);if(rlCell)rlCell.innerHTML=getRiskBadge(res.level);
var sgCell=document.getElementById('sg_'+res.row.id);if(sgCell)sgCell.innerHTML=getSuggestText(res.level);
var rsCell=document.getElementById('rs_'+res.row.id);if(rsCell)rsCell.innerHTML=buildReasonText(res.dimScores,res.level);
var clCell=document.getElementById('cl_'+res.row.id);if(clCell){var sel='<select onchange="onConclusionChange(this)"><option value="H"'+(res.level==='H'?' selected':'')+'>H - 必须进行DRBFM分析</option><option value="M"'+(res.level==='M'?' selected':'')+'>M - 建议进行DRBFM分析</option><option value="L"'+(res.level==='L'?' selected':'')+'>L - 可以不进行DRBFM分析</option></select>';clCell.innerHTML=sel;}
var rjCell=document.getElementById('rj_'+res.row.id);if(rjCell){rjCell.innerHTML='<input type="text" placeholder="如拒绝建议请填写理由" style="width:100%;border:1px solid #ddd;border-radius:3px;padding:2px 4px;font-size:11px;font-family:var(--font-family)">';}
}
completedSteps[5]=true;buildStepBar();
alert('评分完成！请查看评分结果。');
}

function onConclusionChange(sel){var badge=getRiskBadge(sel.value);var rowId=sel.parentNode.id.replace('cl_','');var rlCell=document.getElementById('rl_'+rowId);if(rlCell)rlCell.innerHTML=badge;}

function resetForm(){
var radios=document.querySelectorAll('#evalTable input[type="radio"]');radios.forEach(function(r){r.checked=false;});
document.querySelectorAll('#evalTable .score-cell, #evalTable .result-cell').forEach(function(c){c.innerHTML='';});
}

function buildStep6(){
var h='<div class="step-panel">';
h+='<div class="section-title">风险综合评分(1-12分)</div>';
h+='<div class="score-formula">风险综合评分(1-12分) = 技术新颖性<span class="hl">×15%</span> + 影响范围<span class="hl">×30%</span> + 失效严重度<span class="hl">×30%</span> + 变更复杂度<span class="hl">×20%</span> + 历史问题<span class="hl">×5%</span></div>';
h+='<div class="info-box info-box-yellow" style="margin-bottom:12px">风险等级：<span style="color:var(--danger);font-weight:700">H（≥8分）</span> | <span style="color:#856404;font-weight:700">M（5~8分）</span> | <span style="color:var(--gray-500);font-weight:700">L（<5分）</span></div>';
h+='<div id="scoreResultArea"></div>';
h+='</div>';
return h;
}

function buildScoreResult(){
var level0Rows=rows.filter(function(r){return r.level===0;});
var h='';
for(var i=0;i<level0Rows.length;i++){
var row=level0Rows[i];var dimScores=[];var totalWeighted=0;
for(var d=0;d<dims.length;d++){var s=getDimScore(row.id,d);if(s<0)s=0;dimScores.push(s);totalWeighted+=s*dims[d].weight;}
totalWeighted=Math.round(totalWeighted*100)/100;
var scaledScore=Math.round(totalWeighted*1.2*10)/10;
if(scaledScore>12)scaledScore=12;if(scaledScore<1&&totalWeighted>0)scaledScore=1;if(totalWeighted===0)scaledScore=0;
var level=getRiskLevel(scaledScore);

h+='<div class="eval-item-card">';
h+='<div class="eval-item-header"><span>'+row.id+' '+row.name+' — '+row.change+'</span>';
h+='<span class="risk-tag risk-'+level+'">'+level+'级 ('+scaledScore+'分)</span></div>';
h+='<div class="eval-item-body">';
var dimNames=['技术新颖性','影响范围','失效严重度','变更复杂度','历史问题'];
var dimWeights=['15%','30%','30%','20%','5%'];
for(var d=0;d<dims.length;d++){var ds=dimScores[d];var dsText=ds>=0?ds:'<span style="color:var(--danger)">未填写</span>';h+='<div class="score-row"><span class="label">'+dimNames[d]+'：</span><span class="value">'+dsText+'</span><span class="weight">×'+dimWeights[d]+'</span></div>';}
h+='<div class="score-row" style="margin-top:8px;padding-top:8px;border-top:1px solid var(--gray-200)"><span class="label" style="font-weight:700">综合评分：</span><span class="value" style="font-size:18px;color:var(--primary)">'+scaledScore+'</span></div>';
h+='<div class="conclusion-row"><span class="label">DRBFM触发评估建议：</span><span style="font-weight:700">'+getSuggestText(level)+'</span></div>';
h+='<div class="conclusion-row"><span class="label">理由及建议分析重点：</span><span>'+buildReasonText(dimScores,level)+'</span></div>';
h+='<div class="conclusion-row"><span class="label">最终DRBFM触发结论：</span>';
h+='<select style="padding:4px 8px;border:1px solid #ced4da;border-radius:3px;font-size:12px;font-family:var(--font-family)">';
h+='<option value="H"'+(level==='H'?' selected':'')+'>H - 必须进行DRBFM分析</option>';
h+='<option value="M"'+(level==='M'?' selected':'')+'>M - 建议进行DRBFM分析</option>';
h+='<option value="L"'+(level==='L'?' selected':'')+'>L - 可以不进行DRBFM分析</option>';
h+='</select></div>';
h+='<div class="conclusion-row"><span class="label">拒绝建议理由：</span><input type="text" style="width:320px;border:1px solid #ddd;border-radius:4px;padding:4px 8px;font-size:12px;font-family:var(--font-family)" placeholder="如拒绝系统建议，请填写理由"></div>';
h+='</div></div>';
}
document.getElementById('scoreResultArea').innerHTML=h;
completedSteps[6]=true;buildStepBar();
}

function buildStep7(){
var h='<div class="step-panel">';
h+='<div class="section-title">评估确认</div>';
h+='<div style="margin-bottom:12px;font-size:13px;color:var(--gray-600)">确认所有LEVEL=0变更点的五维风险评估已填写完整后，点击"确认评估"按钮完成评估并创建DRBFM分析任务。</div>';
h+='<div id="validationArea"></div>';
h+='<div style="margin-top:16px;text-align:center"><button class="aac-btn aac-btn-primary" onclick="doConfirmEval()">确认评估</button></div>';
h+='</div>';
return h;
}

function buildValidation(){
var errors=validateEvaluation();
var h='';
if(errors.length>0){
h+='<div style="margin-bottom:8px;font-size:13px;color:var(--danger);font-weight:700">以下评估项尚未完成：</div>';
for(var i=0;i<errors.length;i++)h+='<div class="validation-error">'+errors[i]+'</div>';
}else{
h+='<div style="padding:20px;text-align:center;color:var(--success);font-size:14px;font-weight:700">✓ 所有LEVEL=0变更点的五维风险评估已填写完整，可以进行确认</div>';
}
document.getElementById('validationArea').innerHTML=h;
}

function validateEvaluation(){
var errors=[];var level0Rows=rows.filter(function(r){return r.level===0;});
var dimNames=['技术新颖性','影响范围','失效严重度','变更复杂度','历史问题'];
for(var i=0;i<level0Rows.length;i++){var row=level0Rows[i];for(var d=0;d<dims.length;d++){var s=getDimScore(row.id,d);if(s<0)errors.push('第'+row.id+'行 - '+row.name+'：'+dimNames[d]+'维度未填写');}}
return errors;
}

function doConfirmEval(){
var errors=validateEvaluation();
if(errors.length>0){alert('存在未完成的评估项，请补充完整后再确认。');return;}
completedSteps[7]=true;buildStepBar();
alert('评估已确认！系统已自动创建DRBFM分析任务，任务状态：结构分析。');
}

buildStepBar();buildStepContent();
</script>
</body>
</html>
