<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://www.jeasyui.com/easyui/themes/default/easyui.css">
    <link rel="stylesheet" href="https://www.jeasyui.com/easyui/themes/icon.css">
    <script src="https://code.jquery.com/jquery-1.12.4.min.js"></script>
    <script src="https://www.jeasyui.com/easyui/jquery.easyui.min.js"></script>
    <script src="https://www.jeasyui.com/easyui/locale/easyui-lang-zh_CN.js"></script>
    <link rel="stylesheet" href="../css/custom.css">
    <script src="../js/mock-data.js"></script>
    <script src="../js/common.js"></script>
</head>
<body style="margin:0;padding:0;background:#f1f3f5;">
<div class="page-container">
    <div class="page-title">AP参考表</div>
    <div class="toolbar">
        <span class="toolbar-title">AP等级判定规则</span>
        <div style="display:flex;gap:12px;margin-left:auto;">
            <span class="ap-badge ap-A" style="font-size:13px;">A = SOP &gt; 80 (高优先级)</span>
            <span class="ap-badge ap-B" style="font-size:13px;">B = 27 &lt; SOP ≤ 80 (中优先级)</span>
            <span class="ap-badge ap-C" style="font-size:13px;">C = SOP ≤ 27 (低优先级)</span>
        </div>
    </div>
    <table id="dg" class="easyui-datagrid" style="width:100%;height:500px;"
           data-options="fit:false,border:false,striped:true,rownumbers:true,pagination:true,pageSize:50,singleSelect:true">
        <thead>
        <tr>
            <th data-options="field:'s',width:60,align:'center'">S</th>
            <th data-options="field:'o',width:60,align:'center'">O</th>
            <th data-options="field:'d',width:60,align:'center'">D</th>
            <th data-options="field:'sop',width:80,align:'center',styler:sopStyler">SOP</th>
            <th data-options="field:'ap',width:80,align:'center',formatter:parent.Common.apLevelFormatter">AP等级</th>
        </tr>
        </thead>
    </table>
</div>
<script>
function sopStyler(value) {
    if (value > 80) return 'background-color:#ffebee;color:#c62828;font-weight:700;';
    if (value > 27) return 'background-color:#fff8e1;color:#f57f17;font-weight:700;';
    return 'background-color:#e8f5e9;color:#2e7d32;font-weight:700;';
}
$(function () {
    var data = MockData.get('systemConfig').ap_reference;
    $('#dg').datagrid('loadData', data);
});
</script>
</body>
</html>
