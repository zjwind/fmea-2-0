<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://www.jeasyui.com/easyui/themes/default/easyui.css">
    <link rel="stylesheet" href="https://www.jeasyui.com/easyui/themes/icon.css">
    <script src="https://code.jquery.com/jquery-1.12.4.min.js"></script>
    <script src="https://www.jeasyui.com/easyui/jquery.easyui.min.js"></script>
    <script src="https://www.jeasyui.com/easyui/locale/easyui-lang-zh_CN.js"></script>
    <link rel="stylesheet" href="../css/custom.css">
    <script src="../js/mock-data.js"></script>
    <script src="../js/common.js"></script>
</head>
<body style="margin:0;padding:0;background:#f1f3f5;">
<div class="page-container">
    <div class="page-title">分析任务概览</div>
    <div class="toolbar">
        <span class="toolbar-title">任务列表</span>
        <a href="javascript:void(0)" class="easyui-linkbutton" data-options="iconCls:'icon-add'" onclick="parent.Common.showInfo('新建分析任务（原型演示）')">新建任务</a>
    </div>
    <div id="task-cards" style="padding:8px 0;"></div>
</div>
<script>
$(function () {
    var tasks = MockData.get('analysisTasks');
    var html = '';
    for (var i = 0; i < tasks.length; i++) {
        var t = tasks[i];
        html += '<div class="form-section" style="margin-bottom:16px;">';
        html += '<div class="section-header"><div class="section-title">' + t.name + '</div>';
        html += '<div>' + parent.Common.statusFormatter(t.status) + '</div></div>';
        html += '<div class="form-row"><div class="form-group"><label>任务编号</label><div class="form-value">' + t.id + '</div></div>';
        html += '<div class="form-group"><label>负责人</label><div class="form-value">' + t.assignee + '</div></div>';
        html += '<div class="form-group"><label>启动日期</label><div class="form-value">' + (t.started_at || '-') + '</div></div>';
        html += '<div class="form-group"><label>进度</label><div class="form-value">' + t.current_step + '/' + t.total_steps + ' 步骤</div></div></div>';
        html += parent.Common.buildStepProgress(t.steps, t.current_step);
        html += '</div>';
    }
    $('#task-cards').html(html);
});
</script>
</body>
</html>
