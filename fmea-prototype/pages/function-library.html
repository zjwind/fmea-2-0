<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://www.jeasyui.com/easyui/themes/default/easyui.css">
    <link rel="stylesheet" href="https://www.jeasyui.com/easyui/themes/icon.css">
    <script src="https://code.jquery.com/jquery-1.12.4.min.js"></script>
    <script src="https://www.jeasyui.com/easyui/jquery.easyui.min.js"></script>
    <script src="https://www.jeasyui.com/easyui/locale/easyui-lang-zh_CN.js"></script>
    <link rel="stylesheet" href="../css/custom.css">
    <script src="../js/mock-data.js"></script>
    <script src="../js/common.js"></script>
</head>
<body style="margin:0;padding:0;background:#f1f3f5;">
<div class="page-container">
    <div class="page-title">功能库</div>
    <div class="toolbar">
        <span class="toolbar-title">功能库</span>
        <input id="search-key" class="easyui-searchbox" style="width:200px;" data-options="prompt:'搜索功能名称',searcher:doSearch">
        <a href="javascript:void(0)" class="easyui-linkbutton" data-options="iconCls:'icon-add'" onclick="parent.Common.showInfo('新建功能（原型演示）')">新建</a>
    </div>
    <table id="dg" class="easyui-datagrid" style="width:100%;height:400px;"
           data-options="fit:false,border:false,striped:true,rownumbers:true,pagination:true,pageSize:20,singleSelect:true">
        <thead>
        <tr>
            <th data-options="field:'id',width:80">编号</th>
            <th data-options="field:'name',width:120">功能名称</th>
            <th data-options="field:'category',width:100,align:'center'">分类</th>
            <th data-options="field:'desc',width:260">描述</th>
            <th data-options="field:'applicable_products',width:200,formatter:productsFormatter">适用产品</th>
        </tr>
        </thead>
    </table>
</div>
<script>
function productsFormatter(value) {
    if (!value) return '-';
    return value.map(function(v){ return '<span class="tag" style="margin:1px;">' + v + '</span>'; }).join(' ');
}
function doSearch(value) {
    var data = MockData.get('functionLibrary');
    if (value) data = data.filter(function(d){ return d.name.indexOf(value) >= 0; });
    $('#dg').datagrid('loadData', data);
}
$(function () {
    $('#dg').datagrid('loadData', MockData.get('functionLibrary'));
});
</script>
</body>
</html>
