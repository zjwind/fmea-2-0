<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://www.jeasyui.com/easyui/themes/default/easyui.css">
    <link rel="stylesheet" href="https://www.jeasyui.com/easyui/themes/icon.css">
    <script src="https://code.jquery.com/jquery-1.12.4.min.js"></script>
    <script src="https://www.jeasyui.com/easyui/jquery.easyui.min.js"></script>
    <script src="https://www.jeasyui.com/easyui/locale/easyui-lang-zh_CN.js"></script>
    <link rel="stylesheet" href="../css/custom.css">
    <script src="../js/mock-data.js"></script>
    <script src="../js/common.js"></script>
</head>
<body style="margin:0;padding:0;background:#f1f3f5;">
<div class="page-container">
    <div class="page-title">SOD评分 - CloudEngine S12700E</div>
    <div class="toolbar">
        <span class="toolbar-title">SOD评分表</span>
        <a href="javascript:void(0)" class="easyui-linkbutton" data-options="iconCls:'icon-edit'" onclick="parent.Common.showInfo('编辑评分（原型演示）')">编辑评分</a>
        <a href="javascript:void(0)" class="easyui-linkbutton" onclick="parent.Common.showInfo('AI辅助评分（原型演示）')">🤖 AI辅助评分</a>
    </div>
    <table id="dg" class="easyui-datagrid" style="width:100%;height:300px;"
           data-options="fit:false,border:false,striped:true,rownumbers:true,singleSelect:true,onSelect:onSelect">
        <thead>
        <tr>
            <th data-options="field:'id',width:70">编号</th>
            <th data-options="field:'failure_id',width:80">失效ID</th>
            <th data-options="field:'s',width:50,align:'center'">S</th>
            <th data-options="field:'o',width:50,align:'center'">O</th>
            <th data-options="field:'d',width:50,align:'center'">D</th>
            <th data-options="field:'sop',width:70,align:'center',styler:sopStyler">SOP</th>
            <th data-options="field:'ap',width:60,align:'center',formatter:parent.Common.apLevelFormatter">AP</th>
            <th data-options="field:'s_after',width:50,align:'center'">S\'</th>
            <th data-options="field:'o_after',width:50,align:'center'">O\'</th>
            <th data-options="field:'d_after',width:50,align:'center'">D\'</th>
            <th data-options="field:'sop_after',width:70,align:'center',styler:sopAfterStyler">SOP\'</th>
            <th data-options="field:'ap_after',width:60,align:'center',formatter:parent.Common.apLevelFormatter">AP\'</th>
        </tr>
        </thead>
    </table>

    <div id="detail-panel" style="margin-top:16px;display:none;">
        <div class="form-section">
            <div class="section-title">评分详情与措施</div>
            <div id="sod-detail"></div>
        </div>
    </div>
</div>
<script>
function sopStyler(value) {
    if (value > 80) return 'background-color:#ffebee;color:#c62828;font-weight:700;';
    if (value > 27) return 'background-color:#fff8e1;color:#f57f17;font-weight:700;';
    return 'background-color:#f5f5f5;color:#757575;';
}
function sopAfterStyler(value) {
    if (!value) return '';
    if (value > 80) return 'background-color:#ffebee;color:#c62828;font-weight:700;';
    if (value > 27) return 'background-color:#fff8e1;color:#f57f17;font-weight:700;';
    return 'background-color:#e8f5e9;color:#2e7d32;font-weight:700;';
}
function onSelect(index, row) {
    $('#detail-panel').show();
    var fr = MockData.findById(MockData.get('failureRecords'), row.failure_id);
    var html = '<div class="form-row">';
    html += '<div class="form-group"><label>失效结构</label><div class="form-value">' + (fr ? fr.structure : '-') + '</div></div>';
    html += '<div class="form-group"><label>失效功能</label><div class="form-value">' + (fr ? fr.function : '-') + '</div></div>';
    html += '<div class="form-group"><label>失效类型</label><div class="form-value">' + (fr ? fr.failure_mode_name : '-') + '</div></div>';
    html += '<div class="form-group"><label>原因描述</label><div class="form-value">' + (fr ? fr.cause_desc : '-') + '</div></div>';
    html += '</div>';
    html += '<div style="margin-top:12px;"><b>预防措施：</b></div>';
    var pm = MockData.get('preventiveMeasures').filter(function(m){ return m.failure_id === row.failure_id; });
    if (pm.length > 0) {
        html += '<ul style="margin:4px 0 8px 18px;font-size:12px;line-height:1.8;">';
        for (var i = 0; i < pm.length; i++) {
            html += '<li>' + pm[i].desc + ' - ' + parent.Common.statusFormatter(pm[i].status) + '</li>';
        }
        html += '</ul>';
    } else {
        html += '<div style="font-size:12px;color:#868e96;padding:4px 0;">暂无</div>';
    }
    html += '<div><b>探测措施：</b></div>';
    var dm = MockData.get('detectionMeasures').filter(function(m){ return m.failure_id === row.failure_id; });
    if (dm.length > 0) {
        html += '<ul style="margin:4px 0 8px 18px;font-size:12px;line-height:1.8;">';
        for (var j = 0; j < dm.length; j++) {
            html += '<li>' + dm[j].desc + ' - ' + parent.Common.statusFormatter(dm[j].status) + '</li>';
        }
        html += '</ul>';
    } else {
        html += '<div style="font-size:12px;color:#868e96;padding:4px 0;">暂无</div>';
    }
    $('#sod-detail').html(html);
}
$(function () {
    $('#dg').datagrid('loadData', MockData.get('sodRatings'));
    if (MockData.get('sodRatings').length > 0) $('#dg').datagrid('selectRow', 0);
});
</script>
</body>
</html>
