<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://www.jeasyui.com/easyui/themes/default/easyui.css">
    <link rel="stylesheet" href="https://www.jeasyui.com/easyui/themes/icon.css">
    <script src="https://code.jquery.com/jquery-1.12.4.min.js"></script>
    <script src="https://www.jeasyui.com/easyui/jquery.easyui.min.js"></script>
    <script src="https://www.jeasyui.com/easyui/locale/easyui-lang-zh_CN.js"></script>
    <link rel="stylesheet" href="../css/custom.css">
    <script src="../js/mock-data.js"></script>
    <script src="../js/common.js"></script>
</head>
<body style="margin:0;padding:0;background:#f1f3f5;">
<div class="page-container">
    <div class="page-title">DRBFM迭代更新</div>
    <div class="form-section">
        <div class="section-title">迭代记录</div>
        <table id="dg" class="easyui-datagrid" style="width:100%;height:300px;"
               data-options="fit:false,border:false,striped:true,rownumbers:true,singleSelect:true">
            <thead>
            <tr>
                <th data-options="field:'version',width:80,align:'center'">版本</th>
                <th data-options="field:'project_name',width:260">项目名称</th>
                <th data-options="field:'change_desc',width:300">变更说明</th>
                <th data-options="field:'updated_by',width:80,align:'center'">更新人</th>
                <th data-options="field:'updated_at',width:100,align:'center'">更新时间</th>
                <th data-options="field:'status',width:80,align:'center',formatter:parent.Common.statusFormatter">状态</th>
            </tr>
            </thead>
        </table>
    </div>
    <div class="form-section">
        <div class="section-title">触发迭代</div>
        <div style="padding:16px;">
            <div class="form-row">
                <div class="form-group"><label>选择项目</label>
                    <select class="easyui-combobox" style="width:100%;" data-options="panelHeight:'auto',editable:false">
                        <option>P2026001 - CloudEngine S12700E</option>
                        <option>P2026002 - NetEngine AR8000</option>
                    </select>
                </div>
                <div class="form-group"><label>变更类型</label>
                    <select class="easyui-combobox" style="width:100%;" data-options="panelHeight:'auto',editable:false">
                        <option>设计变更</option>
                        <option>工艺变更</option>
                        <option>材料变更</option>
                        <option>客户需求变更</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group" style="flex:2;"><label>变更说明</label>
                    <textarea class="easyui-validatebox" style="width:100%;height:60px;" placeholder="请描述变更内容..."></textarea>
                </div>
            </div>
            <a href="javascript:void(0)" class="easyui-linkbutton" data-options="iconCls:'icon-ok'" onclick="parent.Common.showInfo('提交迭代更新（原型演示）')">提交迭代</a>
        </div>
    </div>
</div>
<script>
$(function () {
    var iterData = [
        { version: 'V1.2', project_name: 'CloudEngine S12700E系列交换机DRBFM分析', change_desc: '新增400GE接口板串扰失效分析', updated_by: '张三', updated_at: '2026-03-20 14:30', status: 'completed' },
        { version: 'V1.1', project_name: 'CloudEngine S12700E系列交换机DRBFM分析', change_desc: '补充电源模块过压保护失效分析', updated_by: '张三', updated_at: '2026-03-10 10:15', status: 'completed' },
        { version: 'V1.0', project_name: 'CloudEngine S12700E系列交换机DRBFM分析', change_desc: '初始版本创建', updated_by: '张三', updated_at: '2026-01-22 09:00', status: 'completed' }
    ];
    $('#dg').datagrid('loadData', iterData);
});
</script>
</body>
</html>
