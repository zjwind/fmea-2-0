<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://www.jeasyui.com/easyui/themes/default/easyui.css">
    <link rel="stylesheet" href="https://www.jeasyui.com/easyui/themes/icon.css">
    <script src="https://code.jquery.com/jquery-1.12.4.min.js"></script>
    <script src="https://www.jeasyui.com/easyui/jquery.easyui.min.js"></script>
    <script src="https://www.jeasyui.com/easyui/locale/easyui-lang-zh_CN.js"></script>
    <link rel="stylesheet" href="../css/custom.css">
    <script src="../js/mock-data.js"></script>
    <script src="../js/common.js"></script>
</head>
<body style="margin:0;padding:0;background:#f1f3f5;">
<div class="page-container">
    <div class="page-title">功能分析 - CloudEngine S12700E</div>
    <div class="form-section">
        <div class="section-title">结构-功能矩阵</div>
        <div id="matrix-content"></div>
    </div>
    <div class="form-section">
        <div class="section-title">功能详情</div>
        <table id="dg-functions" class="easyui-datagrid" style="width:100%;height:280px;"
               data-options="fit:false,border:false,striped:true,rownumbers:true,singleSelect:true">
            <thead>
            <tr>
                <th data-options="field:'name',width:100">功能名称</th>
                <th data-options="field:'category',width:80,align:'center'">分类</th>
                <th data-options="field:'desc',width:260">描述</th>
                <th data-options="field:'applicable_products',width:200,formatter:productsFormatter">适用产品</th>
            </tr>
            </thead>
        </table>
    </div>
</div>
<script>
function productsFormatter(value) {
    if (!value) return '-';
    return value.map(function(v){ return '<span class="tag" style="margin:1px;">' + v + '</span>'; }).join(' ');
}
$(function () {
    var matrix = MockData.get('functionMatrix');
    $('#matrix-content').html(parent.Common.buildFunctionMatrix(matrix));
    var funcs = MockData.get('functionLibrary');
    $('#dg-functions').datagrid('loadData', funcs);
});
</script>
</body>
</html>
