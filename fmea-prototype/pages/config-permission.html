<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://www.jeasyui.com/easyui/themes/default/easyui.css">
    <link rel="stylesheet" href="https://www.jeasyui.com/easyui/themes/icon.css">
    <script src="https://code.jquery.com/jquery-1.12.4.min.js"></script>
    <script src="https://www.jeasyui.com/easyui/jquery.easyui.min.js"></script>
    <script src="https://www.jeasyui.com/easyui/locale/easyui-lang-zh_CN.js"></script>
    <link rel="stylesheet" href="../css/custom.css">
    <script src="../js/mock-data.js"></script>
    <script src="../js/common.js"></script>
</head>
<body style="margin:0;padding:0;background:#f1f3f5;">
<div class="page-container">
    <div class="page-title">权限配置</div>
    <div class="toolbar">
        <span class="toolbar-title">角色权限</span>
        <a href="javascript:void(0)" class="easyui-linkbutton" data-options="iconCls:'icon-add'" onclick="parent.Common.showInfo('新增角色（原型演示）')">新增角色</a>
    </div>
    <table id="dg" class="easyui-datagrid" style="width:100%;height:400px;"
           data-options="fit:false,border:false,striped:true,rownumbers:true,singleSelect:true">
        <thead>
        <tr>
            <th data-options="field:'role',width:120">角色名称</th>
            <th data-options="field:'modules',width:300,formatter:modulesFormatter">可访问模块</th>
            <th data-options="field:'operations',width:300,formatter:opsFormatter">操作权限</th>
        </tr>
        </thead>
    </table>
</div>
<script>
function modulesFormatter(value) {
    if (!value) return '-';
    return value.map(function(v){ return '<span class="tag tag-primary" style="margin:1px;">' + v + '</span>'; }).join(' ');
}
function opsFormatter(value) {
    if (!value) return '-';
    return value.map(function(v){ return '<span class="tag" style="margin:1px;">' + v + '</span>'; }).join(' ');
}
$(function () {
    $('#dg').datagrid('loadData', MockData.get('systemConfig').permissions);
});
</script>
</body>
</html>
