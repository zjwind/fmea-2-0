<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://www.jeasyui.com/easyui/themes/default/easyui.css">
    <link rel="stylesheet" href="https://www.jeasyui.com/easyui/themes/icon.css">
    <script src="https://code.jquery.com/jquery-1.12.4.min.js"></script>
    <script src="https://www.jeasyui.com/easyui/jquery.easyui.min.js"></script>
    <script src="https://www.jeasyui.com/easyui/locale/easyui-lang-zh_CN.js"></script>
    <link rel="stylesheet" href="../css/custom.css">
    <script src="../js/mock-data.js"></script>
    <script src="../js/common.js"></script>
</head>
<body style="margin:0;padding:0;background:#f1f3f5;">
<div class="page-container">
    <div class="page-title">SOD评价标准</div>
    <div class="easyui-tabs" style="width:100%;height:500px;">
        <div title="严重度(S)" style="padding:10px;overflow:auto;">
            <table id="dg-s" class="easyui-datagrid" style="width:100%;height:100%;"
                   data-options="fit:true,border:false,striped:true,rownumbers:true,singleSelect:true">
                <thead>
                <tr>
                    <th data-options="field:'level',width:60,align:'center'">等级</th>
                    <th data-options="field:'desc',width:500">描述</th>
                </tr>
                </thead>
            </table>
        </div>
        <div title="发生度(O)" style="padding:10px;overflow:auto;">
            <table id="dg-o" class="easyui-datagrid" style="width:100%;height:100%;"
                   data-options="fit:true,border:false,striped:true,rownumbers:true,singleSelect:true">
                <thead>
                <tr>
                    <th data-options="field:'level',width:60,align:'center'">等级</th>
                    <th data-options="field:'desc',width:500">描述</th>
                </tr>
                </thead>
            </table>
        </div>
        <div title="探测度(D)" style="padding:10px;overflow:auto;">
            <table id="dg-d" class="easyui-datagrid" style="width:100%;height:100%;"
                   data-options="fit:true,border:false,striped:true,rownumbers:true,singleSelect:true">
                <thead>
                <tr>
                    <th data-options="field:'level',width:60,align:'center'">等级</th>
                    <th data-options="field:'desc',width:500">描述</th>
                </tr>
                </thead>
            </table>
        </div>
    </div>
</div>
<script>
$(function () {
    var config = MockData.get('systemConfig').sod_standards;
    $('#dg-s').datagrid('loadData', config.severity);
    $('#dg-o').datagrid('loadData', config.occurrence);
    $('#dg-d').datagrid('loadData', config.detection);
});
</script>
</body>
</html>
