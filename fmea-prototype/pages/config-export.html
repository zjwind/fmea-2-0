<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://www.jeasyui.com/easyui/themes/default/easyui.css">
    <link rel="stylesheet" href="https://www.jeasyui.com/easyui/themes/icon.css">
    <script src="https://code.jquery.com/jquery-1.12.4.min.js"></script>
    <script src="https://www.jeasyui.com/easyui/jquery.easyui.min.js"></script>
    <script src="https://www.jeasyui.com/easyui/locale/easyui-lang-zh_CN.js"></script>
    <link rel="stylesheet" href="../css/custom.css">
    <script src="../js/mock-data.js"></script>
    <script src="../js/common.js"></script>
</head>
<body style="margin:0;padding:0;background:#f1f3f5;">
<div class="page-container">
    <div class="page-title">导出设置</div>
    <div class="form-section">
        <div class="section-title">导出配置</div>
        <div class="form-row">
            <div class="form-group"><label>导出格式</label>
                <div class="form-value">
                    <label><input type="checkbox" checked disabled> Excel</label>
                    <label style="margin-left:12px;"><input type="checkbox" checked disabled> PDF</label>
                    <label style="margin-left:12px;"><input type="checkbox" checked disabled> Word</label>
                </div>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>报告模板</label>
                <div class="form-value">华为DRBFM标准模板V2.0</div>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>包含内容</label>
                <div class="form-value">
                    <label><input type="checkbox" checked disabled> 措施清单</label>
                    <label style="margin-left:12px;"><input type="checkbox" checked disabled> SOD评分</label>
                    <label style="margin-left:12px;"><input type="checkbox" checked disabled> 基线输出</label>
                    <label style="margin-left:12px;"><input type="checkbox" checked disabled> 评审记录</label>
                </div>
            </div>
        </div>
        <div style="margin-top:16px;">
            <a href="javascript:void(0)" class="easyui-linkbutton" data-options="iconCls:'icon-save'" onclick="parent.Common.showInfo('保存设置（原型演示）')">保存设置</a>
            <a href="javascript:void(0)" class="easyui-linkbutton" onclick="parent.Common.showInfo('预览报告（原型演示）')">预览报告</a>
        </div>
    </div>
</div>
</body>
</html>
