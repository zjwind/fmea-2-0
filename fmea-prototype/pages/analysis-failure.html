<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://www.jeasyui.com/easyui/themes/default/easyui.css">
    <link rel="stylesheet" href="https://www.jeasyui.com/easyui/themes/icon.css">
    <script src="https://code.jquery.com/jquery-1.12.4.min.js"></script>
    <script src="https://www.jeasyui.com/easyui/jquery.easyui.min.js"></script>
    <script src="https://www.jeasyui.com/easyui/locale/easyui-lang-zh_CN.js"></script>
    <link rel="stylesheet" href="../css/custom.css">
    <script src="../js/mock-data.js"></script>
    <script src="../js/common.js"></script>
</head>
<body style="margin:0;padding:0;background:#f1f3f5;">
<div class="page-container">
    <div class="page-title">失效分析 - CloudEngine S12700E</div>

    <div class="form-section">
        <div class="section-title">失效模式分类</div>
        <table id="dg-modes" class="easyui-datagrid" style="width:100%;height:230px;"
               data-options="fit:false,border:false,striped:true,rownumbers:true,singleSelect:true">
            <thead>
            <tr>
                <th data-options="field:'code',width:100,align:'center'">编码</th>
                <th data-options="field:'name',width:100,align:'center'">名称</th>
                <th data-options="field:'desc',width:240">描述</th>
                <th data-options="field:'example',width:300">示例</th>
            </tr>
            </thead>
        </table>
    </div>

    <div class="form-section">
        <div class="section-title">失效原因维度</div>
        <table id="dg-causes" class="easyui-datagrid" style="width:100%;height:220px;"
               data-options="fit:false,border:false,striped:true,rownumbers:true,singleSelect:true">
            <thead>
            <tr>
                <th data-options="field:'code',width:100,align:'center'">编码</th>
                <th data-options="field:'name',width:100,align:'center'">名称</th>
                <th data-options="field:'desc',width:200">描述</th>
                <th data-options="field:'examples',width:300,formatter:examplesFormatter">示例</th>
            </tr>
            </thead>
        </table>
    </div>

    <div class="form-section">
        <div class="section-title">失效影响层级</div>
        <div style="display:flex;gap:16px;padding:8px 0;">
            <div style="flex:1;background:#fff;border:1px solid #dee2e6;border-radius:6px;padding:16px;text-align:center;">
                <div style="font-size:20px;font-weight:700;color:#ea4335;">系统级</div>
                <div style="font-size:12px;color:#868e96;margin-top:4px;">对设备自身功能的影响</div>
            </div>
            <div style="flex:1;background:#fff;border:1px solid #dee2e6;border-radius:6px;padding:16px;text-align:center;">
                <div style="font-size:20px;font-weight:700;color:#fbbc04;">设备级</div>
                <div style="font-size:12px;color:#868e96;margin-top:4px;">对整机或网络的影响</div>
            </div>
            <div style="flex:1;background:#fff;border:1px solid #dee2e6;border-radius:6px;padding:16px;text-align:center;">
                <div style="font-size:20px;font-weight:700;color:#9aa0a6;">客户级</div>
                <div style="font-size:12px;color:#868e96;margin-top:4px;">对最终用户业务的影响</div>
            </div>
        </div>
    </div>

    <div class="form-section">
        <div class="section-title">失效记录</div>
        <table id="dg-records" class="easyui-datagrid" style="width:100%;height:280px;"
               data-options="fit:false,border:false,striped:true,rownumbers:true,singleSelect:true">
            <thead>
            <tr>
                <th data-options="field:'id',width:70">编号</th>
                <th data-options="field:'structure',width:80">结构</th>
                <th data-options="field:'function',width:80">功能</th>
                <th data-options="field:'failure_mode_name',width:80,align:'center'">失效类型</th>
                <th data-options="field:'cause_type',width:80,align:'center'">原因维度</th>
                <th data-options="field:'cause_desc',width:200">原因描述</th>
                <th data-options="field:'effect_system',width:180">系统级影响</th>
                <th data-options="field:'severity',width:40,align:'center'">S</th>
                <th data-options="field:'occurrence',width:40,align:'center'">O</th>
                <th data-options="field:'detection',width:40,align:'center'">D</th>
                <th data-options="field:'ap_before',width:50,align:'center',formatter:parent.Common.apLevelFormatter">AP</th>
                <th data-options="field:'status',width:70,align:'center',formatter:parent.Common.statusFormatter">状态</th>
            </tr>
            </thead>
        </table>
    </div>
</div>
<script>
function examplesFormatter(value) {
    if (!value) return '-';
    return value.map(function(v){ return '<span class="tag" style="margin:1px;">' + v + '</span>'; }).join(' ');
}
$(function () {
    $('#dg-modes').datagrid('loadData', MockData.get('failureModes'));
    $('#dg-causes').datagrid('loadData', MockData.get('failureCauses'));
    $('#dg-records').datagrid('loadData', MockData.get('failureRecords'));
});
</script>
</body>
</html>
