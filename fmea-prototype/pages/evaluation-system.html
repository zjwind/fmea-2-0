function transformChangeList(raw){
var result = [];
var idCounter = 1;
for(var i=0;i<raw.length;i++){
var item = raw[i];
var levelNum = item.level==='SYSTEM'?0:(item.level==='SUBSYSTEM'?1:2);
var row = {
id:idCounter++,
level:levelNum,
itemId:item.id,
structureName:item.structure_name,
devType:item.dev_type==='NEW'?'自主开发':(item.dev_type==='MODIFY'?'联合开发':'供应商开发'),
imnOption:item.imn_option==='必选'?'M':(item.imn_option==='可选'?'N':'I'),
changePoint:item.change_point,
qualityMatch:'',
_parentId:0
};
if(item.children && item.children.length>0){
row.children = [];
var parentId = row.id;
for(var c=0;c<item.children.length;c++){
var child = item.children[c];
var childLevel = child.level==='SYSTEM'?0:(child.level==='SUBSYSTEM'?1:2);
var childRow = {
id:idCounter++,
level:childLevel,
itemId:child.id,
structureName:child.structure_name,
devType:child.dev_type==='NEW'?'自主开发':(child.dev_type==='MODIFY'?'联合开发':'供应商开发'),
imnOption:child.imn_option==='必选'?'M':(child.imn_option==='可选'?'N':'I'),
changePoint:child.change_point,
qualityMatch:'',
_parentId:parentId
};
if(child.children && child.children.length>0){
childRow.children = [];
var subParentId = childRow.id;
for(var sc=0;sc<child.children.length;sc++){
var sub = child.children[sc];
childRow.children.push({
id:idCounter++,
level:sub.level==='SYSTEM'?0:(sub.level==='SUBSYSTEM'?1:2),
itemId:sub.id,
structureName:sub.structure_name,
devType:sub.dev_type==='NEW'?'自主开发':(sub.dev_type==='MODIFY'?'联合开发':'供应商开发'),
imnOption:sub.imn_option==='必选'?'M':(sub.imn_option==='可选'?'N':'I'),
changePoint:sub.change_point,
qualityMatch:'',
_parentId:subParentId
});
}
}
row.children.push(childRow);
}
}
result.push(row);
}
return result;
}

function transformQualityPlan(raw){
var items = [];
if(raw.objectives){
for(var i=0;i<raw.objectives.length;i++){
items.push({category:'质量目标',riskSubType:'目标'+(i+1),guide:raw.objectives[i]});
}
}
if(raw.standards){
for(var i=0;i<raw.standards.length;i++){
items.push({category:'适用标准',riskSubType:'标准'+(i+1),guide:raw.standards[i]});
}
}
return items.length>0?items:getDefaultQualityPlan();
}

function transformHistoryIssues(raw){
var items = [];
for(var i=0;i<raw.length;i++){
var h = raw[i];
items.push({
faultOrderNo:h.id||'',
issueNo:h.id||'',
issueType:h.severity==='H'?'严重问题':'一般问题',
domain:h.product||'',
productModel:h.project||'',
issueDesc:h.failure_mode||'',
detailDesc:h.cause||'',
solution:h.effect||''
});
}
return items.length>0?items:getDefaultHistoryIssues();
}

function buildStepBar(){
var html = '';
for(var i=0;i<steps.length;i++){
if(i>0) html += '<span class="step-arrow">→</span>';
var cls = 'step-item';
if(completedSteps[i]) cls += ' done';
else if(i === currentStep) cls += ' active';
else cls += ' disabled';
var numText = completedSteps[i] ? '✓' : (i+1);
html += '<div class="'+cls+'"><span class="step-num">'+numText+'</span><span>'+steps[i].name+'</span></div>';
}
$('#stepBar').html(html);
}

function buildStepContent(){
var html = '';
html += buildStep0();
html += buildStep1();
html += buildStep2();
html += buildStep3();
html += buildStep4();
html += buildStep5();
html += buildStep6();
html += buildStep7();
$('#stepContent').html(html);
$('.step-panel').removeClass('active').eq(currentStep).addClass('active');
$('#stepInfo').text('步骤 '+(currentStep+1)+' / '+steps.length);
$('#btnPrev').linkbutton(currentStep===0?'disable':'enable');
updateNextBtn();
}

function updateNextBtn(){
$('#btnNext').linkbutton(currentStep===steps.length-1?'disable':'enable');
}

function onDimChange(itemId,dimKey,groupKey,optIdx,val){
if(!scoreData[itemId]) scoreData[itemId] = {};
if(!scoreData[itemId][dimKey]) scoreData[itemId][dimKey] = {};
scoreData[itemId][dimKey][groupKey+'_'+optIdx] = val;
}

function calcDimensionScore(itemId,dimKey){
var d = scoreData[itemId] && scoreData[itemId][dimKey];
if(!d) return -1;
var dim = dimensionData[dimKey];
var groups = [{key:'high',count:dim.high.length},{key:'mid',count:dim.mid.length},{key:'low',count:dim.low.length}];
var hasHigh=false,hasMid=false,hasLow=false;
for(var g=0;g<groups.length;g++){
for(var o=0;o<groups[g].count;o++){
var v = d[groups[g].key+'_'+o];
if(v==='是'){
if(groups[g].key==='high') hasHigh=true;
if(groups[g].key==='mid') hasMid=true;
if(groups[g].key==='low') hasLow=true;
}
}
}
if(hasHigh) return 10;
if(hasMid) return 5;
if(hasLow) return 2;
return 0;
}

function calcRiskScore(itemId){
var weights = {tech_novelty:0.15,impact_scope:0.30,severity:0.30,change_complexity:0.20,history_issue:0.05};
var total = 0;
var allFilled = true;
for(var dimKey in weights){
var s = calcDimensionScore(itemId,dimKey);
if(s<0){allFilled=false;s=0}
total += s * weights[dimKey];
}
return {score:Math.round(total*100)/100,allFilled:allFilled};
}

function getRiskLevel(score){
if(score>=8) return 'H';
if(score>=5) return 'M';
return 'L';
}

function getRiskLabel(level){
var m = {'H':'必须进行DRBFM分析','M':'建议进行DRBFM分析','L':'可以不进行DRBFM分析'};
return m[level]||'';
}

}
if(!allOk){
$.messager.alert('提示','部分变更点的五维评估选项未填写完整，评分结果可能不准确。','warning');

function doAutoMatch(){
matchResults = [];
for(var i=0;i<changeListData.length;i++){
var item = changeListData[i];
var matched = false;
var matchContent = '';
for(var j=0;j<qualityPlanData.length;j++){
if(item.structureName.indexOf(qualityPlanData[j].category)>=0 || qualityPlanData[j].category.indexOf(item.structureName)>=0){
matched = true;
matchContent = qualityPlanData[j].guide;
break;
}
}
if(item.children){
for(var c=0;c<item.children.length;c++){
var child = item.children[c];
for(var j=0;j<qualityPlanData.length;j++){
if(child.structureName.indexOf(qualityPlanData[j].category)>=0 || qualityPlanData[j].category.indexOf(child.structureName)>=0){
child.qualityMatch = qualityPlanData[j].guide;
if(!matched){matched=true;matchContent='子项已匹配'}
}
}
}
}
if(matched && !item.qualityMatch) item.qualityMatch = matchContent;
matchResults.push({itemId:item.itemId,structureName:item.structureName,changePoint:item.changePoint,status:matched?'已匹配':'未匹配',matchContent:item.qualityMatch||'无'});
}
var h = '<table style="width:100%;border-collapse:collapse">';
h += '<thead><tr style="background:var(--gray-50)"><th style="padding:8px;border:1px solid var(--gray-200);text-align:left">ID</th><th style="padding:8px;border:1px solid var(--gray-200);text-align:left">系统/部件名称</th><th style="padding:8px;border:1px solid var(--gray-200);text-align:left">变更点</th><th style="padding:8px;border:1px solid var(--gray-200);text-align:center">匹配状态</th></tr></thead><tbody>';

}
h += '</tbody></table>';
$('#matchPanel').panel('setContent',h);

function validateEvaluation(){
var errors = [];
var level0Items = getLevel0Items();
var dims = ['tech_novelty','impact_scope','severity','change_complexity','history_issue'];
for(var i=0;i<level0Items.length;i++){
var item = level0Items[i];
for(var d=0;d<dims.length;d++){
var s = calcDimensionScore(item.id,dims[d]);
if(s<0) errors.push('第'+item.itemId+'行 - '+item.structureName+'：'+dimensionData[dims[d]].name+'维度未填写');
}
}
return errors;
}

function doConfirmEval(){
var errors = validateEvaluation();
if(errors.length>0){
$('#confirmDialog').dialog('close');
var h = '';
for(var i=0;i<errors.length;i++) h += '<div class="validation-error">'+errors[i]+'</div>';
$('#validationArea').html(h);
$.messager.alert('校验失败','存在未完成的评估项，请补充完整后再确认。','error');
return;
}
$('#confirmDialog').dialog('close');
completedSteps[7] = true;
buildStepBar();
$.messager.alert('评估确认','评估已确认！系统已自动创建DRBFM分析任务，任务状态：结构分析。','info');
}

function prevStep(){
if(currentStep>0){currentStep--;refreshStep()}
}

function nextStep(){
if(currentStep<steps.length-1){currentStep++;refreshStep()}
}

function refreshStep(){
buildStepBar();
buildStepContent();
setTimeout(afterStepRender,150);
}

function afterStepRender(){
if(currentStep===0 && changeListData.length>0) initChangeListGrid();
if(currentStep===4 && historyIssueData.length>0) initHistoryGrid();
if(currentStep===5) initDimensionTabs();
if(currentStep===6) buildScoreResultArea();
if(currentStep===7){
var errors = validateEvaluation();
var h = '';
if(errors.length>0){
h += '<div style="margin-bottom:8px;font-size:13px;color:var(--danger);font-weight:700">以下评估项尚未完成：</div>';
for(var i=0;i<errors.length;i++) h += '<div class="validation-error">'+errors[i]+'</div>';
}else{
h += '<div style="padding:20px;text-align:center;color:var(--success);font-size:14px;font-weight:700">✓ 所有LEVEL=0变更点的五维风险评估已填写完整，可以进行确认</div>';
}
$('#validationArea').html(h);
}
if(currentStep===3){
if(isSubmitted){
$('#btnSubmit').hide();$('#btnWithdraw').show();
$('#submitStatus').text('已提交').css('color','var(--warning)');
}else{
$('#btnSubmit').show();$('#btnWithdraw').hide();
$('#submitStatus').text('草稿').css('color','var(--success)');
}
$('#submitCountText').text(submitCount);
}
}

$(function(){
loadMockData();
buildStepBar();
buildStepContent();
setTimeout(afterStepRender,200);
});
</script>
</body>
</html>
