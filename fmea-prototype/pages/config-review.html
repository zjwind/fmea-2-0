<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://www.jeasyui.com/easyui/themes/default/easyui.css">
    <link rel="stylesheet" href="https://www.jeasyui.com/easyui/themes/icon.css">
    <script src="https://code.jquery.com/jquery-1.12.4.min.js"></script>
    <script src="https://www.jeasyui.com/easyui/jquery.easyui.min.js"></script>
    <script src="https://www.jeasyui.com/easyui/locale/easyui-lang-zh_CN.js"></script>
    <link rel="stylesheet" href="../css/custom.css">
    <script src="../js/mock-data.js"></script>
    <script src="../js/common.js"></script>
</head>
<body style="margin:0;padding:0;background:#f1f3f5;">
<div class="page-container">
    <div class="page-title">评审角色设置</div>
    <div class="toolbar">
        <span class="toolbar-title">评审角色列表</span>
        <a href="javascript:void(0)" class="easyui-linkbutton" data-options="iconCls:'icon-add'" onclick="parent.Common.showInfo('新增角色（原型演示）')">新增</a>
    </div>
    <table id="dg" class="easyui-datagrid" style="width:100%;height:350px;"
           data-options="fit:false,border:false,striped:true,rownumbers:true,singleSelect:true">
        <thead>
        <tr>
            <th data-options="field:'id',width:80">编号</th>
            <th data-options="field:'name',width:140">角色名称</th>
            <th data-options="field:'desc',width:300">描述</th>
            <th data-options="field:'required',width:80,align:'center',formatter:reqFormatter">是否必须</th>
        </tr>
        </thead>
    </table>
</div>
<script>
function reqFormatter(value) {
    return value ? '<span class="badge badge-approved">必须</span>' : '<span class="badge badge-draft">可选</span>';
}
$(function () {
    $('#dg').datagrid('loadData', MockData.get('systemConfig').review_roles);
});
</script>
</body>
</html>
