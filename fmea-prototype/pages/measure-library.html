<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://www.jeasyui.com/easyui/themes/default/easyui.css">
    <link rel="stylesheet" href="https://www.jeasyui.com/easyui/themes/icon.css">
    <script src="https://code.jquery.com/jquery-1.12.4.min.js"></script>
    <script src="https://www.jeasyui.com/easyui/jquery.easyui.min.js"></script>
    <script src="https://www.jeasyui.com/easyui/locale/easyui-lang-zh_CN.js"></script>
    <link rel="stylesheet" href="../css/custom.css">
    <script src="../js/mock-data.js"></script>
    <script src="../js/common.js"></script>
</head>
<body style="margin:0;padding:0;background:#f1f3f5;">
<div class="page-container">
    <div class="page-title">措施库</div>
    <div class="toolbar">
        <span class="toolbar-title">措施库</span>
        <input id="search-key" class="easyui-searchbox" style="width:200px;" data-options="prompt:'搜索措施名称',searcher:doSearch">
        <a href="javascript:void(0)" class="easyui-linkbutton" data-options="iconCls:'icon-add'" onclick="parent.Common.showInfo('新建措施（原型演示）')">新建</a>
    </div>
    <table id="dg" class="easyui-datagrid" style="width:100%;height:400px;"
           data-options="fit:false,border:false,striped:true,rownumbers:true,pagination:true,pageSize:20,singleSelect:true">
        <thead>
        <tr>
            <th data-options="field:'id',width:80">编号</th>
            <th data-options="field:'name',width:240">措施名称</th>
            <th data-options="field:'category',width:80,align:'center',formatter:catFormatter">分类</th>
            <th data-options="field:'applicable',width:140">适用场景</th>
            <th data-options="field:'effectiveness',width:80,align:'center',formatter:parent.Common.riskLevelFormatter">有效性</th>
            <th data-options="field:'reference_count',width:80,align:'center'">引用次数</th>
        </tr>
        </thead>
    </table>
</div>
<script>
function catFormatter(value) {
    var map = { PREVENTIVE: '预防措施', DETECTION: '探测措施', OPTIMIZATION: '优化措施' };
    return '<span class="tag tag-primary">' + (map[value] || value) + '</span>';
}
function doSearch(value) {
    var data = MockData.get('measureLibrary');
    if (value) data = data.filter(function(d){ return d.name.indexOf(value) >= 0; });
    $('#dg').datagrid('loadData', data);
}
$(function () {
    $('#dg').datagrid('loadData', MockData.get('measureLibrary'));
});
</script>
</body>
</html>
