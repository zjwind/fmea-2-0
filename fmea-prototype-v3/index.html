<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FMEA 2.0 / DRBFM 全生命周期管理平台</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-shell">
    <!-- 顶部 -->
    <header class="app-header">
        <div class="brand">
            <div class="brand-logo">F</div>
            <div class="brand-text">
                <div class="t1">FMEA 2.0 / DRBFM 管理平台</div>
                <div class="t2">DESIGN REVIEW BASED ON FAILURE MODE</div>
            </div>
        </div>
        <div class="header-right">
            <div class="header-icon" title="帮助">
                <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12" y2="17"/></svg>
            </div>
            <div class="header-icon" title="通知">
                <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                <span class="dot"></span>
            </div>
            <div class="user-chip" onclick="App.toast('当前账号：张明 · TSE / 项目PM','success')">
                <div class="user-avatar">张</div>
                <div class="user-meta">
                    <div class="name">张明</div>
                    <div class="role">TSE · 项目PM</div>
                </div>
            </div>
        </div>
    </header>

    <!-- 侧边栏 -->
    <aside class="app-sidebar" id="sidebar"></aside>

    <!-- 内容 -->
    <main class="app-main">
        <iframe id="content-frame" src="pages/home.html"></iframe>
    </main>
</div>

<div id="toast-wrap"></div>

<script src="js/menu.js"></script>
<script src="js/app.js"></script>
</body>
</html>
